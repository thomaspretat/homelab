apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lol-esport-bot-data-pvc
spec:
  storageClassName: ""
  volumeName: lol-esport-bot-data-pv
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi

---

apiVersion: v1
kind: PersistentVolume
metadata:
  name: lol-esport-bot-data-pv
spec:
  accessModes:
    - ReadWriteOnce
  capacity:
    storage: 100Mi
  hostPath:
    path: /data/lol-esport-bot
